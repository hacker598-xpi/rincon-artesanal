<header class="site-header" id="site-header">
    <div class="header-container">
        <a href="index.html" class="header-brand" aria-label="El Rincón Artesanal – Inicio">
            <div class="brand-icon">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 2a14.5 14.5 0 0 1 0 20"/>
                    <path d="M12 2a14.5 14.5 0 0 0 0 20"/>
                    <path d="M8 10c0-2 2-4 4-4s4 2 4 4-2 4-4 4-4-2-4-4z"/>
                </svg>
            </div>
            <span class="brand-text">
                <span class="brand-name">El Rincón</span>
                <span class="brand-sub">Artesanal</span>
            </span>
        </a>

        <nav class="header-nav" aria-label="Navegación principal">
            <ul class="nav-list">
                <li><a href="index.html" class="nav-link">Inicio</a></li>
                <li><a href="pages/about.html" class="nav-link">Acerca de</a></li>
                <li><a href="pages/products.html" class="nav-link">Productos</a></li>
                <li><a href="pages/services.html" class="nav-link">Servicios</a></li>
                <li><a href="pages/contact.html" class="nav-link">Contacto</a></li>
            </ul>
        </nav>

        <div class="header-actions">
            <a href="pages/cart.html" class="header-cart" aria-label="Ver carrito de compras">

                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>

                </svg>
                <span id="cart-count" class="cart-badge" aria-live="polite">0</span>
            </a>

            <button id="theme-toggle" class="header-theme-btn" aria-label="Cambiar tema claro/oscuro">
                <svg class="icon-sun" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">

                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>

            <button class="header-hamburger" aria-label="Abrir menú" aria-expanded="false">

                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>

    <div class="header-ornament" aria-hidden="true">
        <svg width="100%" height="8" viewBox="0 0 1200 8" preserveAspectRatio="none">
            <rect width="1200" height="8" fill="var(--color-primary)" opacity="0.3"/>

        </svg>
