<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito – El Rincón Artesanal</title>
    <link rel="icon" href="../favicon.ico">
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components/navigation.css">
    <link rel="stylesheet" href="../css/components/header.css">
    <link rel="stylesheet" href="../css/components/footer.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/components/forms.css">
    <link rel="stylesheet" href="../css/components/modals.css">
    <link rel="stylesheet" href="../css/pages/cart.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div id="site-header"></div>

    <main class="container cart-page">
        <div class="cart-header reveal">
            <h1>Tu carrito</h1>
            <a href="products.html" class="btn btn-outline btn-small">← Seguir comprando</a>
        </div>

        <div id="cart-container" class="cart-container"></div>
    </main>

    <div id="order-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content cart-modal">
            <button class="modal-close" onclick="closeModal('order-modal')">&times;</button>
            <div class="modal-icon">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.5" aria-hidden="true">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
            </div>
            <h2>Completa tu pedido</h2>
            <p class="modal-sub">Ingresa tu número de teléfono de Cuba y te enviaremos la confirmación por WhatsApp y SMS.</p>
            <label for="order-phone">Número de teléfono</label>
            <input type="tel" id="order-phone" placeholder="+53 XXXXXXXX" required>
            <button onclick="realizarPedido()" class="btn btn-primary btn-block">Enviar pedido</button>
        </div>
    </div>

    <div id="site-footer"></div>

    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/order.js"></script>
    <script src="../js/components/modal.js"></script>
    <script src="../js/components/navigation.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/pages/cart.js"></script>
</body>
</html>
